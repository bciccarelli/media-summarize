# Gemini API
gemini:
  api_key: "your-gemini-api-key"
  model: "gemini-2.5-flash"

# Gmail SMTP (requires app password — enable 2FA first)
# Generate app password at: https://myaccount.google.com/apppasswords
email:
  sender: "you@gmail.com"
  app_password: "xxxx xxxx xxxx xxxx"
  recipient: "you@gmail.com"

# Settings
settings:
  target_tweets: 60           # How many tweets to collect from your X feed
  max_digest_items: 3         # Hard cap; expect 0-2 items per day
  min_signal_score: 8         # Items below this 1-10 score are filtered out
  suggest_like_count: 3       # Top-N X items to suggest liking manually
  dedup_window_days: 7        # How long sent URLs stay in digest_state.json
